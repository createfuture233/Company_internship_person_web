# ========== Personal Planet Docker Compose 部署 ==========
# 快速启动：
#   1. 修改 .env 文件中的配置（特别是 ADMIN_INITIAL_PASSWORD、域名、API Key）
#   2. 构建并启动：docker compose up -d --build
#   3. 查看日志：docker compose logs -f
#   4. 停止：docker compose down
#   5. 访问：http://localhost:8080（或配置 Nginx 反向代理到 8080）

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: personal-planet-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: file:/app/data/personal-planet.db
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-admin123}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      AI_MAX_CONTEXT_CHARS: ${AI_MAX_CONTEXT_CHARS:-12000}
      AI_VISITOR_RATE_LIMIT: ${AI_VISITOR_RATE_LIMIT:-20}
      AI_ADMIN_RATE_LIMIT: ${AI_ADMIN_RATE_LIMIT:-100}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - server-data:/app/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        PUBLIC_API_BASE: ${PUBLIC_API_BASE:-/api}
    container_name: personal-planet-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4321
      HOST: 0.0.0.0
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-/api}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: personal-planet-nginx
    restart: unless-stopped
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

volumes:
  server-data:
    name: personal-planet-data

networks:
  app-network:
    driver: bridge
